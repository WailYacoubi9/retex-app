# App RETEX : API (FastAPI) + Frontend (Streamlit).
# Se branche sur le reseau "retex-net" cree par retex-backbone.
#
# Prerequis : le backbone doit tourner (docker compose up dans retex-backbone).
#   docker compose up -d --build
services:

  api:
    build: ./api
    container_name: retex-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    networks:
      - retex-net

  frontend:
    build: ./frontend
    container_name: retex-frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    networks:
      - retex-net

networks:
  retex-net:
    external: true
